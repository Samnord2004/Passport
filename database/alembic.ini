# A generic, single-database configuration for Alembic.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, prepend to sys.path.
# Defaults to the current directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as
# well as the filename.
# string_value is passed to dateutil.tz.gettz()
# leave blank for local time
# timezone =

# max length of characters to use for automatic revision string
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate being used or not
# revision_environment = false

# set to 'true' to allow empty slug to be passed to 'revision'
# if 'false', empty slug is substituted with 'unnamed'
# repr_unnamed = false

# set to 'true' to write "alembic_version" column on the DB setting
# version_table_schema =

# set to 'true' to write "alembic_version" column on the DB setting with
# custom version table name
# version_table = alembic_version

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
